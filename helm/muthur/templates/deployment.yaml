apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "muthur.fullname" . }}
  labels:
    {{- include "muthur.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "muthur.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      labels:
        {{- include "muthur.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: {{ .Chart.Name }}
          image: {{ include "muthur.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          env:
            - name: PORT
              value: "8080"
            - name: LOG_LEVEL
              value: {{ .Values.config.logLevel | quote }}
            - name: ANTHROPIC_MODEL
              value: {{ .Values.config.anthropicModel | quote }}
            - name: DEDUP_WINDOW_MINUTES
              value: {{ .Values.config.dedupWindowMinutes | quote }}
            - name: ALERTMANAGER_URL
              value: {{ .Values.config.alertmanagerUrl | quote }}
            - name: ALERTMANAGER_SILENCE_ENABLED
              value: {{ .Values.config.alertmanagerSilenceEnabled | quote }}
            - name: ALERTMANAGER_SILENCE_DURATION
              value: {{ .Values.config.alertmanagerSilenceDuration | quote }}
            - name: MUTHUR_CONFIG_FILE
              value: /config/muthur.yaml
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "muthur.fullname" . }}-secret
                  key: ANTHROPIC_API_KEY
            {{- range .Values.collectors }}
            - name: COLLECTOR_TOKEN_{{ .clusterId | upper | replace "-" "_" }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "muthur.fullname" $ }}-secret
                  key: {{ .tokenSecretKey }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            {{- if or .Values.externalSecrets.receiverSecretKeys .Values.devSecrets.receiverSecrets }}
            - name: receiver-secrets
              mountPath: /secrets/receivers
              readOnly: true
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "muthur.fullname" . }}-config
        {{- if or .Values.externalSecrets.receiverSecretKeys .Values.devSecrets.receiverSecrets }}
        - name: receiver-secrets
          secret:
            secretName: {{ include "muthur.fullname" . }}-secret
            items:
              {{- range .Values.externalSecrets.receiverSecretKeys }}
              - key: {{ . }}
                path: {{ . }}
              {{- end }}
              {{- range $key, $value := .Values.devSecrets.receiverSecrets }}
              - key: {{ $key }}
                path: {{ $key }}
              {{- end }}
        {{- end }}
