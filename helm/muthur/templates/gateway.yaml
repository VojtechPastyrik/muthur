{{- if .Values.gateway.enabled -}}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ default (include "muthur.fullname" .) .Values.gateway.name }}
  namespace: {{ default .Release.Namespace .Values.gateway.namespace }}
  labels:
    {{- include "muthur.labels" . | nindent 4 }}
spec:
  gatewayClassName: {{ .Values.gateway.className }}
  listeners:
    - name: https
      hostname: {{ .Values.httpRoute.host | quote }}
      port: {{ .Values.gateway.listener.port }}
      protocol: {{ .Values.gateway.listener.protocol }}
      allowedRoutes:
        namespaces:
          from: {{ .Values.gateway.listener.allowedRoutesNamespacesFrom }}
      {{- if .Values.gateway.tls.enabled }}
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: {{ .Values.gateway.tls.secretName }}
      {{- end }}
{{- end }}

