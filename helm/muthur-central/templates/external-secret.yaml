{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "muthur-central.fullname" . }}-secret
  labels:
    {{- include "muthur-central.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreName }}
    kind: {{ .Values.externalSecrets.secretStoreKind }}
  target:
    name: {{ include "muthur-central.fullname" . }}-secret
    creationPolicy: Owner
  data:
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.remoteSecretPath }}
        property: anthropic-api-key
    - secretKey: TELEGRAM_TOKEN
      remoteRef:
        key: {{ .Values.externalSecrets.remoteSecretPath }}
        property: telegram-token
    - secretKey: TELEGRAM_CHAT_ID
      remoteRef:
        key: {{ .Values.externalSecrets.remoteSecretPath }}
        property: telegram-chat-id
    - secretKey: DISCORD_WEBHOOK_URL
      remoteRef:
        key: {{ .Values.externalSecrets.remoteSecretPath }}
        property: discord-webhook-url
    - secretKey: SLACK_WEBHOOK_URL
      remoteRef:
        key: {{ .Values.externalSecrets.remoteSecretPath }}
        property: slack-webhook-url
    - secretKey: PAGERDUTY_ROUTING_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.remoteSecretPath }}
        property: pagerduty-routing-key
    - secretKey: GENERIC_WEBHOOK_URL
      remoteRef:
        key: {{ .Values.externalSecrets.remoteSecretPath }}
        property: generic-webhook-url
    {{- range .Values.externalSecrets.collectorTokenKeys }}
    - secretKey: {{ . }}
      remoteRef:
        key: {{ $.Values.externalSecrets.remoteSecretPath }}
        property: {{ . }}
    {{- end }}
{{- end }}
{{- if and .Values.devSecrets.enabled (not .Values.externalSecrets.enabled) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "muthur-central.fullname" . }}-secret
  labels:
    {{- include "muthur-central.labels" . | nindent 4 }}
type: Opaque
stringData:
  ANTHROPIC_API_KEY: {{ .Values.devSecrets.anthropicApiKey | quote }}
  TELEGRAM_TOKEN: {{ .Values.devSecrets.telegramToken | quote }}
  TELEGRAM_CHAT_ID: {{ .Values.devSecrets.telegramChatId | quote }}
  DISCORD_WEBHOOK_URL: {{ .Values.devSecrets.discordWebhookUrl | quote }}
  SLACK_WEBHOOK_URL: {{ .Values.devSecrets.slackWebhookUrl | quote }}
  PAGERDUTY_ROUTING_KEY: {{ .Values.devSecrets.pagerdutyRoutingKey | quote }}
  GENERIC_WEBHOOK_URL: {{ .Values.devSecrets.genericWebhookUrl | quote }}
  {{- range .Values.devSecrets.collectorTokens }}
  collector-token-{{ .clusterId }}: {{ .token | quote }}
  {{- end }}
{{- end }}
