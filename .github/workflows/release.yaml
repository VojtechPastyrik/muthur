name: Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: vojtechpastyrik/muthur-central

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate protobuf
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          make proto

      - run: make test

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  charts:
    runs-on: ubuntu-latest
    needs: docker
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Package chart
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          helm package helm/muthur-central --version ${VERSION} --app-version ${VERSION}

      - name: Clone charts repo
        run: |
          git clone --branch gh-pages https://x-access-token:${{ secrets.CHARTS_REPO_TOKEN }}@github.com/vojtechpastyrik/charts.git charts-repo

      - name: Update Helm repo index
        run: |
          cp muthur-central-*.tgz charts-repo/
          cd charts-repo
          if [ -f index.yaml ]; then
            helm repo index . --url https://vojtechpastyrik.github.io/charts --merge index.yaml
          else
            helm repo index . --url https://vojtechpastyrik.github.io/charts
          fi

      - name: Push to charts repo
        run: |
          cd charts-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.yaml muthur-central-*.tgz
          git diff --staged --quiet || git commit -m "muthur-central ${GITHUB_REF_NAME}"
          git push
